name: self-train

# Autoentrenamiento mensual: el bot aprende de sus resultados y se vuelve más selectivo.
# Corre el día 1 de cada mes (después del resumen).
on:
  schedule:
    - cron: '30 13 1 * *' # día 1, 13:30 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --omit=dev

      - name: Autoentrenamiento
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/self-train.js

      - name: Guardar lo aprendido
        run: |
          git config user.name "autobot"
          git config user.email "autobot@users.noreply.github.com"
          git add cerebro-trading/00-principios cerebro-trading/.train-state.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sin cambios."
          else
            git commit -m "self-train: autoentrenamiento mensual [skip ci]"
            git pull --rebase --autostash || true
            git push || true
          fi
