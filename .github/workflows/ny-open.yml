name: ny-open

# Análisis de la apertura de NY (refresca la nota del cerebro).
#
# NOTA: el TRADE de las 8 AM NY ya NO se dispara aquí — lo ejecuta el autobot
# (scripts/autobot.js), que corre fiable cada 30 min vía el pinger externo. El
# cron de GitHub se retrasaba horas y, cuando corría, ya no eran las 8 en NY,
# así que la compuerta lo saltaba. Este workflow queda solo para refrescar el
# análisis a mano (botón "Run workflow") cuando quieras.
on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ny-open
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install --omit=dev

      - name: NY Open — refrescar análisis (el TRADE lo hace el autobot)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/ny-open.js BTC/USDT 270 || true

      - name: Guardar diario y análisis
        run: |
          git config user.name "autobot"
          git config user.email "autobot@users.noreply.github.com"
          git add cerebro-trading/diario cerebro-trading/00-principios 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sin cambios."
          else
            git commit -m "ny-open: trade 8:15 + análisis [skip ci]"
            git pull --rebase --autostash || true
            git push || true
          fi
