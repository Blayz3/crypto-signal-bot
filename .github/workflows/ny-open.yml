name: ny-open

# Trade de la apertura de Nueva York a las 8:15 AM (hora de NY), todos los días.
# Dispara a las 12:15 y 13:15 UTC; un "gate" deja correr SOLO cuando en NY son las 8
# (así acierta las 8:15 NY tanto en verano EDT como en invierno EST).
on:
  schedule:
    - cron: '15 12 * * *' # 12:15 UTC = 8:15 NY (verano / EDT)
    - cron: '15 13 * * *' # 13:15 UTC = 8:15 NY (invierno / EST)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ny-open
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ¿Son las 8 AM en Nueva York?
        id: gate
        run: echo "h=$(TZ=America/New_York date +%H)" >> "$GITHUB_OUTPUT"

      - name: Instalar dependencias
        if: steps.gate.outputs.h == '08'
        run: npm install --omit=dev

      - name: NY Open — análisis + trade
        if: steps.gate.outputs.h == '08'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          node scripts/ny-open.js BTC/USDT 270 || true
          node scripts/ny-open-trade.js

      - name: Guardar diario y análisis
        if: steps.gate.outputs.h == '08'
        run: |
          git config user.name "autobot"
          git config user.email "autobot@users.noreply.github.com"
          git add cerebro-trading/diario cerebro-trading/00-principios 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sin cambios."
          else
            git commit -m "ny-open: trade 8:15 + análisis [skip ci]"
            git pull --rebase --autostash || true
            git push || true
          fi
